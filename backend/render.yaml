services:
  - type: web
    name: neuroshield-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        value: sqlite:///./neuroshield.db
      - key: SECRET_KEY
        generateValue: true
      - key: REDIS_URL
        value: redis://red-xxxxx:6379 # Connect to Render Redis
