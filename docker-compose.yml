version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///./neuroshield.db
      - REDIS_URL=redis://redis:6379
      - SECRET_KEY=neuroshield_docker_secret_key
    depends_on:
      - redis
    volumes:
      - ./backend:/app

  redis:
    image: "redis:alpine"
    ports:
      - "6379:6379"

  frontend:
    image: node:18-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "8081:8081"
    command: sh -c "npm install && npx expo start --tunnel"
